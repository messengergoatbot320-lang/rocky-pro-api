<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rocky Pro API</title>

<!-- PREVIEW -->
<meta property="og:title" content="Rocky Pro API">
<meta property="og:description" content="Secure Modern API System by Rocky Chowdhury">
<meta property="og:image" content="https://i.imgur.com/UQoSZqc.jpeg">

<style>
body{
margin:0;
background:black;
color:#0ff;
font-family:monospace;
text-align:center;
overflow-x:hidden;
}

/* MATRIX BACKGROUND */
body::before{
content:"0101010101010101";
position:fixed;
width:100%;
height:100%;
color:#0f0;
font-size:12px;
opacity:0.08;
animation:move 10s linear infinite;
}
@keyframes move{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

/* TITLE */
.title{
font-size:22px;
color:#00ffcc;
text-shadow:0 0 15px #00ffcc;
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px #0ff}
to{text-shadow:0 0 25px #0ff}
}

/* CARD */
.card{
background:#111;
padding:15px;
margin:15px;
border-radius:15px;
box-shadow:0 0 15px #00ffcc;
}

/* BUTTON */
.btn{
margin:8px;
padding:12px 20px;
border-radius:25px;
border:none;
background:linear-gradient(90deg,#00ffcc,#0066ff);
color:white;
font-size:14px;
box-shadow:0 0 10px #00ffcc;
cursor:pointer;
}

/* INPUT */
input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
width:80%;
}

</style>
</head>

<body>

<h2 class="title">
⚡ MASTERMIND CYBER FORCES ⚡<br>
OWNER BY ROCKY CHOWDHURY
</h2>

<!-- TOKEN SYSTEM -->
<div class="card">
<h3>🔑 System Access</h3>
<input id="token" placeholder="Enter Bot Token">
<input id="admin" placeholder="Enter Admin UID">
<button class="btn" onclick="save()">Activate</button>
<p id="status"></p>
</div>

<!-- API SECTION -->
<div class="card">
<h3>🌐 API Tools</h3>

<input id="query" placeholder="Search / Name / City">

<button class="btn" onclick="youtube()">YouTube</button>
<button class="btn" onclick="ip()">IP</button>
<button class="btn" onclick="joke()">Joke</button>
<button class="btn" onclick="quote()">Quote</button>
<button class="btn" onclick="cat()">Cat</button>
<button class="btn" onclick="dog()">Dog</button>
<button class="btn" onclick="age()">Age</button>
<button class="btn" onclick="gender()">Gender</button>
<button class="btn" onclick="country()">Country</button>
<button class="btn" onclick="weather()">Weather</button>
<button class="btn" onclick="fact()">Fact</button>
<button class="btn" onclick="number()">Number</button>
<button class="btn" onclick="bored()">Activity</button>
<button class="btn" onclick="advice()">Advice</button>

<p id="result"></p>

</div>

<script>

// SAVE TOKEN
function save(){
let t = token.value;
let a = admin.value;

if(!t || !a){
alert("Fill all fields");
return;
}

localStorage.setItem("token",t);
localStorage.setItem("admin",a);

status.innerText="✅ System Activated";
}

// YOUTUBE
function youtube(){
let q=query.value;
window.open("https://www.youtube.com/results?search_query="+q);
}

// IP
function ip(){
fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>result.innerText="IP: "+d.ip)
.catch(()=>result.innerText="Error");
}

// JOKE
function joke(){
fetch("https://official-joke-api.appspot.com/random_joke")
.then(r=>r.json())
.then(d=>result.innerText=d.setup+" - "+d.punchline)
.catch(()=>result.innerText="Error");
}

// QUOTE
function quote(){
fetch("https://api.quotable.io/random")
.then(r=>r.json())
.then(d=>result.innerText=d.content)
.catch(()=>result.innerText="Error");
}

// CAT
function cat(){
fetch("https://api.thecatapi.com/v1/images/search")
.then(r=>r.json())
.then(d=>result.innerHTML="<img src='"+d[0].url+"' width='200'>")
.catch(()=>result.innerText="Error");
}

// DOG
function dog(){
fetch("https://dog.ceo/api/breeds/image/random")
.then(r=>r.json())
.then(d=>result.innerHTML="<img src='"+d.message+"' width='200'>")
.catch(()=>result.innerText="Error");
}

// AGE
function age(){
fetch("https://api.agify.io/?name="+query.value)
.then(r=>r.json())
.then(d=>result.innerText="Age: "+d.age)
.catch(()=>result.innerText="Error");
}

// GENDER
function gender(){
fetch("https://api.genderize.io/?name="+query.value)
.then(r=>r.json())
.then(d=>result.innerText="Gender: "+d.gender)
.catch(()=>result.innerText="Error");
}

// COUNTRY
function country(){
fetch("https://api.nationalize.io/?name="+query.value)
.then(r=>r.json())
.then(d=>result.innerText="Country: "+(d.country[0]?.country_id || "Unknown"))
.catch(()=>result.innerText="Error");
}

// WEATHER
function weather(){
fetch("https://wttr.in/"+query.value+"?format=3")
.then(r=>r.text())
.then(d=>result.innerText=d)
.catch(()=>result.innerText="Error");
}

// FACT
function fact(){
fetch("https://uselessfacts.jsph.pl/random.json?language=en")
.then(r=>r.json())
.then(d=>result.innerText=d.text)
.catch(()=>result.innerText="Error");
}

// NUMBER (FIXED HTTPS)
function number(){
fetch("https://numbersapi.com/random?json")
.then(r=>r.json())
.then(d=>result.innerText=d.text)
.catch(()=>result.innerText="Error");
}

// BORED
function bored(){
fetch("https://www.boredapi.com/api/activity")
.then(r=>r.json())
.then(d=>result.innerText=d.activity)
.catch(()=>result.innerText="Error");
}

// ADVICE
function advice(){
fetch("https://api.adviceslip.com/advice")
.then(r=>r.json())
.then(d=>result.innerText=d.slip.advice)
.catch(()=>result.innerText="Error");
}

</script>

</body>
</html>
